<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>

        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: sans-serif;
            }

            /* Camera container */
            #camera-container {
                position: relative;
                width: 100vw;
                height: 100vh;
                background: black;
            }

            /* Canvas will fill the container */
            canvas {
                position: absolute;
                top: 0;
                left: 0;
                z-index: 0;
            }

            /* Rule of thirds overlay */
            .grid-line {
                position: absolute;
                z-index: 1;
                background: rgba(255, 255, 255, 0.5);
            }

            /* Vertical lines */
            #v1,
            #v2 {
                width: 2px;
                height: 100%;
            }

            #v1 {
                left: 33.33%;
            }
            #v2 {
                left: 66.66%;
            }

            /* Horizontal lines */
            #h1,
            #h2 {
                height: 2px;
                width: 100%;
            }

            #h1 {
                top: 33.33%;
            }
            #h2 {
                top: 66.66%;
            }

            /* Shutter button */
            #shutter {
                z-index: 2;
                position: absolute;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%);
                width: 70px;
                height: 70px;
                border-radius: 50%;
                border: 4px solid white;
                background: rgba(255, 255, 255, 0.1);
                cursor: pointer;
                transition: background 0.1s;
            }

            #shutter:active {
                background: rgba(255, 255, 255, 0.5);
            }

            /* Flash effect */
            #flash {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: white;
                opacity: 0;
                pointer-events: none;
            }
        </style>
    </head>

    <body>
        <div id="camera-container">
            <div id="v1" class="grid-line"></div>
            <div id="v2" class="grid-line"></div>
            <div id="h1" class="grid-line"></div>
            <div id="h2" class="grid-line"></div>

            <div id="shutter"></div>
            <div id="flash"></div>
        </div>

        <script>
            let cam;
            let flashEl = document.getElementById("flash");

            // Setup p5 canvas
            function setup() {
                const canvas = createCanvas(windowWidth, windowHeight);
                canvas.parent("camera-container");

                // Use rear camera, audio off
                cam = createCapture({
                    video: { facingMode: "environment" },
                    audio: false,
                });

                cam.elt.muted = true;
                cam.hide();
            }

            function draw() {
                background(0);

                let canvasRatio = width / height;
                let videoRatio = cam.width / cam.height;

                let drawWidth, drawHeight;

                if (canvasRatio > videoRatio) {
                    drawWidth = width;
                    drawHeight = width / videoRatio;
                } else {
                    drawHeight = height;
                    drawWidth = height * videoRatio;
                }

                image(
                    cam,
                    width / 2 - drawWidth / 2,
                    height / 2 - drawHeight / 2,
                    drawWidth,
                    drawHeight,
                );
            }

            // Handle window resize
            function windowResized() {
                resizeCanvas(windowWidth, windowHeight);
            }

            // Shutter button click
            document
                .getElementById("shutter")
                .addEventListener("click", takePhoto);

            function takePhoto() {
                // Flash effect
                flashEl.style.opacity = 1;
                setTimeout(() => (flashEl.style.opacity = 0), 100);

                // Capture image from canvas
                let img = get();
                let data = img.canvas.toDataURL("image/png");

                // Use anchor to trigger download
                let a = document.createElement("a");
                a.href = data;
                a.download = "photo.png";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        </script>
    </body>
</html>
