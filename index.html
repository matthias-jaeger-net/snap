<!doctype html>
<html lang="en">
    <head>
        <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>

        <style>
            body {
                margin: 0;
                overflow: hidden;
            }
        </style>

        <meta charset="utf-8" />
    </head>

    <body>
        <script>
            let cam;
            let flash = 0;

            function setup() {
                createCanvas(windowWidth, windowHeight);

                cam = createCapture(VIDEO);
                cam.hide();
            }

            function draw() {
                background(0);

                let canvasRatio = width / height;
                let videoRatio = cam.width / cam.height;

                let drawWidth, drawHeight;

                if (canvasRatio > videoRatio) {
                    drawWidth = width;
                    drawHeight = width / videoRatio;
                } else {
                    drawHeight = height;
                    drawWidth = height * videoRatio;
                }

                image(
                    cam,
                    width / 2 - drawWidth / 2,
                    height / 2 - drawHeight / 2,
                    drawWidth,
                    drawHeight,
                );

                // rule of thirds
                stroke(180);
                strokeWeight(2);
                line(width / 3, 0, width / 3, height);
                line((2 * width) / 3, 0, (2 * width) / 3, height);
                line(0, height / 3, width, height / 3);
                line(0, (2 * height) / 3, width, (2 * height) / 3);

                // shutter flash
                if (flash > 0) {
                    fill(255, flash);
                    noStroke();
                    rect(0, 0, width, height);
                    flash -= 20;
                }

                // camera shutter button
                noFill();
                stroke(255);
                strokeWeight(4);
                circle(width / 2, height - 80, 70);
            }

            function keyPressed() {
                if (key === " ") {
                    takePhoto();
                }
            }

            function mousePressed() {
                if (dist(mouseX, mouseY, width / 2, height - 80) < 35) {
                    takePhoto();
                }
            }

            function takePhoto() {
                flash = 255;

                let img = get(); // capture canvas
                let data = img.canvas.toDataURL("image/png");

                let w = window.open("");
                w.document.write('<img src="' + data + '" style="width:100%">');
            }

            function windowResized() {
                resizeCanvas(windowWidth, windowHeight);
            }
        </script>
    </body>
</html>
