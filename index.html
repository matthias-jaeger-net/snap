<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>

        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: sans-serif;
            }

            /* Camera container */
            #camera-container {
                position: relative;
                width: 100vw;
                height: 100vh;
                background: black;
            }

            /* Canvas behind UI */
            #camera-container canvas {
                position: absolute;
                top: 0;
                left: 0;
                z-index: 0;
            }

            /* Rule-of-thirds grid */
            .grid-line {
                position: absolute;
                z-index: 1;
                background: rgba(255, 255, 255, 0.5);
            }

            /* Vertical lines */
            #v1,
            #v2 {
                width: 2px;
                height: 100%;
            }
            #v1 {
                left: 33.33%;
            }
            #v2 {
                left: 66.66%;
            }

            /* Horizontal lines */
            #h1,
            #h2 {
                height: 2px;
                width: 100%;
            }
            #h1 {
                top: 33.33%;
            }
            #h2 {
                top: 66.66%;
            }

            /* Shutter button */
            #shutter {
                z-index: 2;
                position: absolute;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%);
                width: 70px;
                height: 70px;
                border-radius: 50%;
                border: 4px solid white;
                background: rgba(255, 255, 255, 0.1);
                cursor: pointer;
                transition: background 0.1s;
            }

            #shutter:active {
                background: rgba(255, 255, 255, 0.5);
            }

            /* Flash effect */
            #flash {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: white;
                opacity: 0;
                pointer-events: none;
                z-index: 2;
            }

            /* Captured photo overlay (iOS) */
            #photo-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: black;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 3;
                display: none;
            }

            #photo-overlay img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }

            #photo-overlay p {
                position: absolute;
                bottom: 20px;
                color: white;
                font-size: 16px;
                text-align: center;
                width: 100%;
            }
        </style>
    </head>

    <body>
        <div id="camera-container">
            <!-- Rule-of-thirds grid -->
            <div id="v1" class="grid-line"></div>
            <div id="v2" class="grid-line"></div>
            <div id="h1" class="grid-line"></div>
            <div id="h2" class="grid-line"></div>

            <!-- Shutter button -->
            <div id="shutter"></div>

            <!-- Flash effect -->
            <div id="flash"></div>

            <!-- iOS photo overlay -->
            <div id="photo-overlay">
                <img id="captured-photo" src="" />
                <p>Tap and hold the photo to save it</p>
            </div>
        </div>

        <script>
            let cam;
            let flashEl = document.getElementById("flash");
            let overlay = document.getElementById("photo-overlay");
            let capturedImg = document.getElementById("captured-photo");

            // Setup p5 canvas
            function setup() {
                const canvas = createCanvas(windowWidth, windowHeight);
                canvas.parent("camera-container");

                cam = createCapture({
                    video: { facingMode: "environment" },
                    audio: false,
                });

                cam.elt.muted = true;
                cam.hide();
            }

            function draw() {
                background(0);

                let canvasRatio = width / height;
                let videoRatio = cam.width / cam.height;

                let drawWidth, drawHeight;

                if (canvasRatio > videoRatio) {
                    drawWidth = width;
                    drawHeight = width / videoRatio;
                } else {
                    drawHeight = height;
                    drawWidth = height * videoRatio;
                }

                image(
                    cam,
                    width / 2 - drawWidth / 2,
                    height / 2 - drawHeight / 2,
                    drawWidth,
                    drawHeight,
                );
            }

            function windowResized() {
                resizeCanvas(windowWidth, windowHeight);
            }

            // Shutter button click
            document
                .getElementById("shutter")
                .addEventListener("click", takePhoto);

            function takePhoto() {
                // Flash animation
                flashEl.style.opacity = 1;
                setTimeout(() => (flashEl.style.opacity = 0), 100);

                // Capture canvas image
                let img = get();
                let data = img.canvas.toDataURL("image/png");

                // Detect iOS
                let isIOS =
                    /iPad|iPhone|iPod/.test(navigator.userAgent) &&
                    !window.MSStream;

                if (isIOS) {
                    // Show overlay with photo for long-press save
                    capturedImg.src = data;
                    overlay.style.display = "flex";
                } else {
                    // Normal download for Android/Desktop
                    let a = document.createElement("a");
                    a.href = data;
                    a.download = "photo.png";
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }

            // Click overlay to dismiss
            overlay.addEventListener("click", () => {
                overlay.style.display = "none";
            });
        </script>
    </body>
</html>
